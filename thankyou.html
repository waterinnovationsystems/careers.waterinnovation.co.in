<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#6a11cb,#2575fc);
    overflow:hidden;
}

/* Animated Background */
body::before,
body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;
    background:rgba(255,255,255,.08);
    animation:float 10s ease-in-out infinite;
}

body::before{
    top:-150px;
    left:-150px;
}

body::after{
    bottom:-150px;
    right:-150px;
    animation-delay:5s;
}

@keyframes float{
    0%,100%{
        transform:translateY(0) scale(1);
    }
    50%{
        transform:translateY(30px) scale(1.1);
    }
}

/* Card */

.card{
    position:relative;
    z-index:10;
    width:90%;
    max-width:700px;
    padding:50px;
    text-align:center;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.25);
    border-radius:25px;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
    color:white;
    animation:fadeUp 1s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.checkmark{
    width:120px;
    height:120px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(135deg,#00e676,#00c853);
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 15px 35px rgba(0,230,118,.4);
    animation:pop .8s ease;
}

@keyframes pop{
    0%{
        transform:scale(0);
    }
    80%{
        transform:scale(1.15);
    }
    100%{
        transform:scale(1);
    }
}

.checkmark svg{
    width:60px;
    fill:none;
    stroke:#fff;
    stroke-width:6;
    stroke-linecap:round;
    stroke-linejoin:round;
    stroke-dasharray:100;
    stroke-dashoffset:100;
    animation:draw .8s ease forwards .5s;
}

@keyframes draw{
    to{
        stroke-dashoffset:0;
    }
}

h1{
    margin-top:30px;
    font-size:48px;
    font-weight:700;
}

p{
    margin:20px auto 35px;
    line-height:1.8;
    max-width:500px;
    color:#f1f1f1;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.btn{
    text-decoration:none;
    color:white;
    padding:15px 35px;
    border-radius:50px;
    transition:.3s;
    font-weight:600;
    letter-spacing:.5px;
}

.primary{
    background:white;
    color:#2575fc;
}

.primary:hover{
    transform:translateY(-5px);
    box-shadow:0 15px 30px rgba(255,255,255,.35);
}

.secondary{
    border:2px solid white;
}

.secondary:hover{
    background:white;
    color:#2575fc;
    transform:translateY(-5px);
}

.footer{
    margin-top:35px;
    font-size:14px;
    opacity:.85;
}

@media(max-width:600px){

.card{
    padding:35px 25px;
}

h1{
    font-size:36px;
}

.checkmark{
    width:100px;
    height:100px;
}
}
</style>
</head>

<body>

<div class="card">

    <div class="checkmark">
        <svg viewBox="0 0 52 52">
            <path d="M14 27 L22 35 L39 18"></path>
        </svg>
    </div>

    <h1>Thank You!</h1>

    <p>
        Your submission has been received successfully.
        We truly appreciate your time and support.
        Our team will get back to you as soon as possible.
    </p>

    <div class="buttons">
        <a href="#" class="btn primary">Go Home</a>
        <a href="#" class="btn secondary">Contact Us</a>
    </div>

    <div class="footer">
        ❤️ We appreciate your trust and look forward to serving you again.
    </div>

</div>

</body>
</html>
